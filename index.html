<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BYBLOS GROUP</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

/* ===== الخلفية العامة (أسود فاخر) ===== */

body{
    margin:0;
    font-family:'Cinzel', serif;
    background:#0b0b0c;
    color:white;
}

/* ===== القسم العلوي ===== */

.hero{
    position:relative;
    height:70vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,#151515 0%,#0b0b0c 70%);
    overflow:hidden;
}

/* النقوش الفضية مع التلاشي */
.hero::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:
    repeating-linear-gradient(
        135deg,
        rgba(255,255,255,0.08) 0px,
        rgba(255,255,255,0.08) 2px,
        transparent 2px,
        transparent 40px
    );
    mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 75%);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 75%);
}

/* ===== الشعار ===== */

.logo{
    position:relative;
    text-align:center;
}

/* BYBLOS */

.byblos{
    font-size:84px;
    font-weight:900;
    letter-spacing:12px;
    background:linear-gradient(
        90deg,
        #bfbfbf 0%,
        #ffffff 30%,
        #9c9c9c 50%,
        #ffffff 70%,
        #bfbfbf 100%
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    position:relative;
}

/* لمعان متحرك */
.byblos::after{
    content:'';
    position:absolute;
    top:0;
    left:-120%;
    width:50%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.9),transparent);
    animation:shine 5s infinite;
}

@keyframes shine{
    0%{left:-120%;}
    60%{left:120%;}
    100%{left:120%;}
}

/* GROUP بنفس مكان الصورة */

.group{
    position:absolute;
    right:-120px;
    bottom:-10px;
    font-family:'Great Vibes', cursive;
    font-size:46px;
    color:#e3e3e3;
    letter-spacing:3px;
}

/* ===== الشركات ===== */

.companies{
    padding:80px 20px;
}

/* الصف الاول */

.row{
    display:flex;
    justify-content:center;
    gap:35px;
    margin-bottom:35px;
    flex-wrap:wrap;
}

/* الصف الثاني (4 مربعات) */

.row.second{
    max-width:1000px;
    margin:auto;
}

/* الكارد */

.card{
    width:230px;
    height:120px;
    background:#111113;
    border:1px solid #262626;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    transition:0.35s;
    text-decoration:none;
    color:white;
    position:relative;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    border-color:#bfbfbf;
    box-shadow:0 0 28px rgba(255,255,255,0.18);
}

.card h3{
    font-size:17px;
    font-weight:500;
    letter-spacing:1px;
}

/* الفوتر */

footer{
    text-align:center;
    padding:30px;
    color:#888;
    border-top:1px solid #1a1a1a;
}

</style>

</head>

<body>

<section class="hero">
    <div class="logo">
        <span class="byblos">BYBLOS</span>
        <span class="group">Group</span>
    </div>
</section>

<section class="companies">

```
<div class="row">
    <a class="card" href="#"><h3>Byblos 4 Medicine</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Real Estate</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Hospitality</h3></a>
</div>

<div class="row second">
    <a class="card" href="#"><h3>Byblos 4 Media Prod</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Advetising</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Exhibitions</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Event</h3></a>
</div>
```

</section>

<footer>
© 2026 BYBLOS GROUP — All Rights Reserved
</footer>

</body>
</html>
