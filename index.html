<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BYBLOS GROUP</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">

<style>

/* ===== الخلفية العامة ===== */

body{
    margin:0;
    font-family:'Cinzel', serif;
    background:#0e0e11;
    color:white;
}

/* ===== القسم العلوي ===== */

.hero{
    position:relative;
    height:70vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,#1d1d21 0%,#0e0e11 70%);
    overflow:hidden;
}

/* النقش الفضي الواضح */
.hero::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;

    /* خطوط أوضح */
    background:
    repeating-linear-gradient(
        135deg,
        rgba(255,255,255,0.12) 0px,
        rgba(255,255,255,0.12) 2px,
        transparent 2px,
        transparent 28px
    );

    /* تلاشي للأسفل */
    mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 75%);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 75%);
}

/* إضاءة علوية خفيفة */
.hero::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:60%;
    background:linear-gradient(to bottom, rgba(255,255,255,0.10), transparent);
    pointer-events:none;
}

/* ===== الشعار ===== */

.logo{
    text-align:center;
    position:relative;
    z-index:2;
}

.logo img{
    width:520px;
    max-width:90%;
    margin-top:40px;
    filter: drop-shadow(0 0 22px rgba(255,255,255,0.35));
}

/* ===== الشركات ===== */

.companies{
    padding:80px 20px;
}

.row{
    display:flex;
    justify-content:center;
    gap:35px;
    margin-bottom:35px;
    flex-wrap:wrap;
}

.card{
    width:230px;
    height:120px;
    background:#15151a;
    border:1px solid #2c2c2c;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    transition:0.35s;
    text-decoration:none;
    color:white;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    border-color:#d0d0d0;
    box-shadow:0 0 30px rgba(255,255,255,0.22);
}

.card h3{
    font-size:17px;
    font-weight:500;
    letter-spacing:1px;
}

/* الفوتر */

footer{
    text-align:center;
    padding:30px;
    color:#888;
    border-top:1px solid #222;
}

</style>

</head>

<body>

<section class="hero">
    <div class="logo">
        <img src="logo.png" alt="BYBLOS GROUP LOGO">
    </div>
</section>

<section class="companies">

```
<div class="row">
    <a class="card" href="#"><h3>Byblos 4 Medicine</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Real Estate</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Hospitality</h3></a>
</div>

<div class="row">
    <a class="card" href="#"><h3>Byblos 4 Media Prod</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Advetising</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Exhibitions</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Event</h3></a>
</div>
```

</section>

<footer>
© 2026 BYBLOS GROUP — All Rights Reserved
</footer>

</body>
</html>
