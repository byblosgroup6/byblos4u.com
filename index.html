<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BYBLOS GROUP</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --white:#ffffff;
    --dark:#0b0d12;
}

body{
    margin:0;
    font-family:'Cinzel', serif;
    background:linear-gradient(to bottom,#0e1118,#0a0c12);
    color:white;
    overflow-x:hidden;
    padding-top:85px;
}

/* ================= NAVBAR ================= */

.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:85px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(15,17,25,0.85);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    z-index:1000;
}

.nav-logo{
    height:42px;
}

.nav-center{
    display:flex;
    gap:40px;
    align-items:center;
}

.nav-center a{
    text-decoration:none;
    color:white;
    font-size:14px;
    letter-spacing:2px;
}

/* ================= HERO ================= */

.hero{
    height:80vh; /* اقصر من النسخة السابقة */
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* خطوط فضية خفيفة فقط بدون وميض */
.hero::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    repeating-linear-gradient(
        135deg,
        rgba(255,255,255,0.04) 0px,
        rgba(255,255,255,0.04) 1px,
        transparent 1px,
        transparent 70px
    );
}

.main-logo{
    width:520px;
    max-width:90%;
}

/* ================= COMPANIES ================= */

.companies{
    padding:70px 20px; /* رجعناها اقصر */
}

.row{
    display:flex;
    justify-content:center;
    gap:35px;
    margin-bottom:40px;
    flex-wrap:wrap;
}

.card{
    width:250px;
    height:170px;
    background:rgba(25,27,35,0.75);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
}

.card-content{
    display:flex;
    flex-direction:column;
    gap:10px;
    align-items:center;
}

.card h3{
    font-size:16px;
    letter-spacing:2px;
    color:white;
}

.card a{
    color:white;
    text-decoration:none;
}

/* logos */
.gec-logo,
.tfg-logo,
.astoria-logo{
    width:130px;
    height:70px;
    object-fit:contain;
}

/* ================= FOOTER ================= */

footer{
    text-align:center;
    padding:35px;
    border-top:1px solid rgba(255,255,255,0.08);
    color:#aaa;
    letter-spacing:2px;
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){
    body{padding-top:70px;}
    .navbar{height:70px;}
    .main-logo{width:280px;}
    .row{flex-direction:column;align-items:center;}
    .card{width:90%;max-width:330px;}
}

</style>
</head>

<body>

<header class="navbar">
<div>
<img src="b.png" class="nav-logo">
</div>
<nav class="nav-center">
<a href="#">Home</a>
<a href="#">About Us</a>
<a href="#">Our Companies</a>
<a href="#">Locations</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<img src="logo2.png" class="main-logo">
</section>

<section class="companies">

<div class="row">

<a class="card" href="https://germaneyecentre.com" target="_blank">
<div class="card-content">
<h3>Byblos 4 Medicine</h3>
<img src="gec.png" class="gec-logo">
</div>
</a>

<a class="card">
<div class="card-content">
<h3>Byblos 4 Real Estate</h3>
<img src="tfg.png" class="tfg-logo">
</div>
</a>

<a class="card" href="https://astoriahosp.com/" target="_blank">
<div class="card-content">
<h3>Byblos 4 Hospitality</h3>
<img src="astoriahosp.png" class="astoria-logo">
</div>
</a>

</div>

<div class="row">
<a class="card"><div class="card-content"><h3>Byblos 4 Media Production</h3></div></a>
<a class="card"><div class="card-content"><h3>Byblos 4 Advertising</h3></div></a>
<a class="card"><div class="card-content"><h3>Byblos 4 Exhibitions</h3></div></a>
<a class="card"><div class="card-content"><h3>Byblos 4 Events</h3></div></a>
</div>

</section>

<footer>
© 2026 BYBLOS GROUP
</footer>

</body>
</html>
