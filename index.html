<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BYBLOS GROUP</title>

<style>

/* ===== إعدادات عامة ===== */

body{
    margin:0;
    font-family:Segoe UI, Tahoma, sans-serif;
    background:#000;
    color:white;
}

/* ===== القسم العلوي ===== */

.hero{
    position:relative;
    height:65vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:radial-gradient(circle at center,#111 0%,#000 75%);
    overflow:hidden;
}

/* النقش الفضي المائل مع التلاشي */
.hero::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:
    repeating-linear-gradient(
        135deg,
        rgba(255,255,255,0.07) 0px,
        rgba(255,255,255,0.07) 2px,
        transparent 2px,
        transparent 42px
    );
    pointer-events:none;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 75%);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 75%);
}

/* ===== شعار BYBLOS ===== */

.logo{
    text-align:center;
    position:relative;
    z-index:2;
}

.byblos{
    font-size:72px;
    font-weight:800;
    letter-spacing:10px;
    font-family:'Segoe UI', Tahoma, sans-serif;
    background:linear-gradient(
        90deg,
        #bfbfbf 0%,
        #ffffff 25%,
        #9e9e9e 50%,
        #ffffff 75%,
        #bfbfbf 100%
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    position:relative;
}

.group{
    display:block;
    margin-top:8px;
    font-size:32px;
    font-family:"Brush Script MT", cursive;
    color:#dcdcdc;
    letter-spacing:3px;
}

/* لمعان الشعار */
.byblos::after{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:50%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.8),transparent);
    animation:shine 4s infinite;
}

@keyframes shine{
    0%{left:-100%;}
    60%{left:120%;}
    100%{left:120%;}
}

/* ===== الشركات ===== */

.companies{
    padding:70px 20px;
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:30px;
    max-width:1100px;
    margin:auto;
}

.card{
    background:#0d0d0d;
    border:1px solid #222;
    padding:30px;
    border-radius:14px;
    transition:0.3s;
    text-decoration:none;
    color:white;
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-8px) scale(1.03);
    border-color:#aaa;
    box-shadow:0 0 25px rgba(255,255,255,0.15);
}

.card h3{
    margin:0;
    font-weight:500;
    letter-spacing:1px;
}

footer{
    text-align:center;
    padding:25px;
    color:#777;
    border-top:1px solid #111;
}

</style>

</head>

<body>

<section class="hero">
    <div class="logo">
        <span class="byblos">BYBLOS</span>
        <span class="group">Group</span>
    </div>
</section>

<section class="companies">
    <div class="grid">

    </a>

</div>

</footer>

</body>
</html>
