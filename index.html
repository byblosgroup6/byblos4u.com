<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BYBLOS GROUP</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Cinzel', serif;
    background:#0f0f13;
    color:white;
}

/* HERO */

.hero{
    position:relative;
    height:75vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,#1c1c22 0%,#0f0f13 70%);
    overflow:hidden;
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    repeating-linear-gradient(
        135deg,
        rgba(255,255,255,0.08) 0px,
        rgba(255,255,255,0.08) 2px,
        transparent 2px,
        transparent 30px
    );
    mask-image: linear-gradient(to bottom, rgba(0,0,0,1), transparent 75%);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1), transparent 75%);
}

/* LOGO */

.logo{
    text-align:center;
    position:relative;
    z-index:2;
    padding-bottom:70px;
}

.logo img{
    width:520px;
    max-width:90%;
    margin-top:40px;
    position:relative;
    z-index:2;
    filter: drop-shadow(0 0 22px rgba(255,255,255,0.35));
}

/* REFLECTION (CLOSE TO LOGO) */

.logo::after{
    content:"";
    position:absolute;
    top:calc(100% - 5px);
    left:50%;
    transform:translateX(-50%) scaleY(-1);
    width:520px;
    max-width:90%;
    height:220px;
    background:url("logo.png") no-repeat center;
    background-size:contain;
    opacity:0.28;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    filter: blur(1.4px);
    pointer-events:none;
}

/* COMPANIES */

.companies{
    padding:90px 20px;
    background:linear-gradient(to bottom,#0f0f13 0%,#141419 100%);
    border-top:1px solid #26262b;
    box-shadow: inset 0 40px 80px rgba(255,255,255,0.04);
}

.row{
    display:flex;
    justify-content:center;
    gap:35px;
    margin-bottom:35px;
    flex-wrap:wrap;
}

/* CARDS */

.card{
    width:230px;
    height:120px;
    background:linear-gradient(145deg,#1b1b20,#121216);
    border:1px solid #2f2f36;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    transition:0.35s;
    text-decoration:none;
    color:white;
    box-shadow:0 8px 22px rgba(0,0,0,0.6);
}

.card:hover{
    transform:translateY(-12px) scale(1.06);
    border-color:#d6d6d6;
    box-shadow:
        0 15px 40px rgba(0,0,0,0.9),
        0 0 35px rgba(255,255,255,0.18);
}

.card h3{
    font-size:17px;
    font-weight:500;
    letter-spacing:1px;
}

/* MOBILE */

@media (max-width:768px){
    .hero{
        height:60vh;
    }
    .logo img{
        width:320px;
        margin-top:20px;
    }
    .logo{
        padding-bottom:50px;
    }
    .card{
        width:90%;
        max-width:320px;
        height:90px;
    }
}

/* FOOTER */

footer{
    text-align:center;
    padding:30px;
    color:#888;
    border-top:1px solid #222;
}

</style>
</head>

<body>

<section class="hero">
    <div class="logo">
        <img src="logo.png" alt="BYBLOS GROUP LOGO">
    </div>
</section>

<section class="companies">

<div class="row">
    <a class="card" href="#"><h3>Byblos 4 Medicine</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Real Estate</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Hospitality</h3></a>
</div>

<div class="row">
    <a class="card" href="#"><h3>Byblos 4 Media Prod</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Advertising</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Exhibitions</h3></a>
    <a class="card" href="#"><h3>Byblos 4 Event</h3></a>
</div>

</section>

<footer>
© 2026 BYBLOS GROUP — All Rights Reserved
</footer>

</body>
</html>
