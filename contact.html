<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - BYBLOS GROUP</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">

<!-- phone countries library -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">

<style>

body{
    margin:0;
    background:#0f1014;
    font-family:'Cinzel', serif;
    color:white;
}

.container{
    max-width:700px;
    margin:80px auto;
    padding:40px;
    background:#16171c;
    border-radius:18px;
    box-shadow:0 0 40px rgba(255,255,255,0.08);
}

h1{
    text-align:center;
    margin-bottom:40px;
    letter-spacing:2px;
}

label{
    display:block;
    margin-top:20px;
    margin-bottom:6px;
    color:#d0d0d0;
}

input, textarea{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #2b2c33;
    background:#0f1014;
    color:white;
    font-size:15px;
}

textarea{
    min-height:140px;
    resize:none;
}

input:focus, textarea:focus{
    outline:none;
    border-color:#bfc3c9;
    box-shadow:0 0 10px rgba(255,255,255,0.15);
}

button{
    width:100%;
    margin-top:30px;
    padding:16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#d9dde3,#8f96a3);
    color:#000;
    font-weight:bold;
    letter-spacing:1px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 18px rgba(255,255,255,0.3);
}

.success{
    text-align:center;
    margin-top:20px;
    color:#7CFF9B;
    display:none;
}

.error{
    text-align:center;
    margin-top:20px;
    color:#ff6b6b;
    display:none;
}

/* phone input alignment fix */
.iti{
    width:100%;
}

</style>
</head>

<body>

<div class="container">

<h1>CONTACT US</h1>

<form id="contact-form">

<label>Full Name</label>
<input type="text" id="name" name="from_name" required>

<label>Phone Number</label>
<input id="phone" type="tel" name="phone" required>

<label>Email Address</label>
<input type="email" id="email" name="reply_to" required>

<label>Your Message</label>
<textarea name="message" required></textarea>

<button type="submit">SEND MESSAGE</button>

<div class="success" id="successMsg">Message sent successfully ✔</div>
<div class="error" id="errorMsg">Failed to send message ✖</div>

</form>
</div>

<!-- emailjs -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- phone countries -->
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js"></script>

<script>

/* EmailJS init */
(function(){
emailjs.init("9HpRmREmXpiS-HG4W");
})();

/* phone countries system */
const phoneInput = document.querySelector("#phone");

const iti = window.intlTelInput(phoneInput, {
    initialCountry: "auto",
    geoIpLookup: function(success, failure) {
        fetch("https://ipapi.co/json")
        .then(res => res.json())
        .then(data => success(data.country_code))
        .catch(() => success("AE"));
    },
    separateDialCode: true,
    nationalMode: false,
    autoPlaceholder: "aggressive",
    utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js"
});

/* form send */
document.getElementById("contact-form").addEventListener("submit", function(e){
e.preventDefault();

/* name letters only */
const name = document.getElementById("name");
if(!/^[A-Za-z\s]+$/.test(name.value)){
alert("Name must contain letters only");
return;
}

/* get full international number */
const fullNumber = iti.getNumber();
phoneInput.value = fullNumber;

emailjs.sendForm("service_nmsxahk","template_w5zf4rc",this)
.then(function(){
document.getElementById("successMsg").style.display="block";
document.getElementById("errorMsg").style.display="none";
document.getElementById("contact-form").reset();
}, function(){
document.getElementById("errorMsg").style.display="block";
});

});

</script>

</body>
</html>
