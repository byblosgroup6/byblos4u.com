<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - BYBLOS GROUP</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">

<style>

body{
    margin:0;
    background:#0f1014;
    font-family:'Cinzel', serif;
    color:white;
}

/* ===== form container ===== */

.container{
    max-width:700px;
    margin:80px auto;
    padding:45px;
    background:#16171c;
    border-radius:18px;
    box-shadow:0 0 50px rgba(255,255,255,0.08);
}

h1{
    text-align:center;
    margin-bottom:40px;
    letter-spacing:3px;
}

/* ===== inputs ===== */

label{
    display:block;
    margin-top:22px;
    margin-bottom:8px;
    color:#dcdcdc;
    font-size:15px;
}

input, textarea{
    width:100%;
    padding:15px;
    border-radius:10px;
    border:1px solid #2b2c33;
    background:#0f1014;
    color:white;
    font-size:15px;
}

textarea{
    min-height:140px;
    resize:none;
}

input:focus, textarea:focus{
    outline:none;
    border-color:#cfd3da;
    box-shadow:0 0 12px rgba(255,255,255,0.2);
}

/* ===== phone style ===== */

.iti{
    width:100%;
}

.iti__selected-dial-code{
    font-size:16px;
    font-weight:bold;
    color:#ffffff !important;
    margin-left:6px;
}

/* ===== button ===== */

button{
    width:100%;
    margin-top:30px;
    padding:17px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#d9dde3,#8f96a3);
    color:#000;
    font-weight:bold;
    letter-spacing:1px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(255,255,255,0.35);
}

/* ===== messages ===== */

.msg{
    text-align:center;
    margin-top:20px;
    display:none;
    font-size:15px;
}

.success{ color:#7CFF9B; }
.error{ color:#ff6b6b; }

</style>
</head>

<body>

<div class="container">
<h1>CONTACT US</h1>

<form id="contact-form">

<label>Full Name</label>
<input type="text" id="name" name="from_name" required>

<label>Phone Number</label>
<input id="phone" type="tel" name="phone" required>

<label>Email Address</label>
<input type="email" id="email" name="reply_to" required>

<label>Your Message</label>
<textarea name="message" required></textarea>

<button type="submit">SEND MESSAGE</button>

<div id="successMsg" class="msg success">Message sent successfully ✔</div>
<div id="errorMsg" class="msg error"></div>

</form>
</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js"></script>

<script>

/* EmailJS */
(function(){
emailjs.init("9HpRmREmXpiS-HG4W");
})();

/* phone system */
const phoneInput = document.querySelector("#phone");

const iti = window.intlTelInput(phoneInput,{
    initialCountry:"auto",
    geoIpLookup:function(success){
        fetch("https://ipapi.co/json")
        .then(res=>res.json())
        .then(data=>success(data.country_code))
        .catch(()=>success("AE"));
    },
    separateDialCode:true,
    nationalMode:false,
    autoPlaceholder:"polite",
    utilsScript:"https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js"
});

/* form validation */
document.getElementById("contact-form").addEventListener("submit",function(e){
e.preventDefault();

const errorBox=document.getElementById("errorMsg");
errorBox.style.display="none";

/* name validation */
const name=document.getElementById("name").value.trim();
if(!/^[A-Za-z\s]{3,40}$/.test(name)){
errorBox.innerText="Please enter a valid name (letters only).";
errorBox.style.display="block";
return;
}

/* email validation */
const email=document.getElementById("email").value.trim();
const emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if(!emailPattern.test(email)){
errorBox.innerText="Please enter a valid email address.";
errorBox.style.display="block";
return;
}

/* phone validation by country */
if(!iti.isValidNumber()){
errorBox.innerText="Phone number is not valid for selected country.";
errorBox.style.display="block";
return;
}

/* get international number */
phoneInput.value=iti.getNumber();

/* send */
emailjs.sendForm("service_nmsxahk","template_w5zf4rc",this)
.then(()=>{
document.getElementById("successMsg").style.display="block";
this.reset();
},()=>{
errorBox.innerText="Server error. Please try again later.";
errorBox.style.display="block";
});

});

</script>

</body>
</html>
